<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận đặt vé</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f5f5f5; padding: 20px;">

<div style="max-width: 600px; margin: auto; background: #ffffff; padding: 20px; border-radius: 8px;">

    <h2 style="color: #2c3e50;">🎬 Xác nhận đặt vé thành công</h2>

    <p>Xin chào <b th:text="${customerName}">Tên khách</b>,</p>

    <p>Bạn đã đặt vé thành công cho bộ phim:</p>

    <h3 style="color: #e74c3c;" th:text="${movieTitle}">Tên phim</h3>

    <p><b>Thời gian chiếu:</b>
        <span th:text="${startTime}">2026-03-27T14:00:00</span>
    </p>

    <p><b>Ghế đã đặt:</b></p>
    <ul>
        <li th:each="seat : ${seats}" th:text="${seat}">A1</li>
    </ul>

    <p><b>Tổng tiền:</b>
        <span th:text="${amount}">300000</span> VND
    </p>

    <hr>

    <p style="color: gray;">
        Vui lòng đến rạp trước giờ chiếu ít nhất 15 phút. <br>
        Chúc bạn xem phim vui vẻ 🍿
    </p>

</div>

</body>
</html>
